version: '3.8'

services:
  gps-management:
    build: .
    container_name: gps-management-system
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - SESSION_SECRET=replace_with_a_long_random_string_here
    volumes:
      # Persist the SQLite database
      - gps_data:/app/server/data.sqlite
      # Persist uploaded letters (PDFs/Images)
      - gps_uploads:/app/server/uploads

volumes:
  gps_data:
  gps_uploads:
